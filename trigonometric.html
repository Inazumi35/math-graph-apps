<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>三角関数グラフ</title>
  <script src="https://www.desmos.com/api/v1.9/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; }
    h1 { text-align: center; padding: 16px; font-size: 1.2rem; color: #333; }
    #calculator { width: 100%; height: 60vh; }
    .formula { text-align: center; font-size: 1.1rem; padding: 8px; color: #333; }
    .info { text-align: center; font-size: 0.85rem; color: #888; padding-bottom: 4px; }
    .func-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 10px 16px 0;
      background: white;
      border-top: 1px solid #ddd;
    }
    .func-row label {
      font-size: 0.95rem;
      font-weight: bold;
      color: #555;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    .func-row input[type=radio]:checked + span { color: #1a73e8; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      padding: 12px 16px 16px;
      background: white;
    }
    .slider-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    label.sl { font-size: 0.9rem; font-weight: bold; color: #555; }
    input[type=range] { width: 180px; }
    .value { font-size: 1.1rem; color: #1a73e8; min-width: 40px; text-align: center; }
  </style>
</head>
<body>
  <h1 id="title">三角関数 y = A sin(Bx)</h1>
  <div id="calculator"></div>
  <div class="formula" id="formula-display"></div>
  <div class="info" id="info-display"></div>
  <div class="func-row">
    <label><input type="radio" name="func" value="sin" checked> <span>sin</span></label>
    <label><input type="radio" name="func" value="cos"> <span>cos</span></label>
    <label><input type="radio" name="func" value="tan"> <span>tan</span></label>
  </div>
  <div class="controls">
    <div class="slider-group">
      <label class="sl">A（振幅）= <span class="value" id="val-A">1</span></label>
      <input type="range" id="slider-A" min="0.5" max="3" step="0.5" value="1">
    </div>
    <div class="slider-group">
      <label class="sl">B（角周波数）= <span class="value" id="val-B">1</span></label>
      <input type="range" id="slider-B" min="0.5" max="4" step="0.5" value="1">
    </div>
  </div>

  <script>
    const elt = document.getElementById('calculator');
    const calc = Desmos.GraphingCalculator(elt, {
      keypad: false,
      expressions: false,
      settingsMenu: false,
      zoomButtons: true,
    });

    let A = 1, B = 1, fn = 'sin';

    function fmtNum(v) {
      return Number.isInteger(v) ? String(v) : v.toFixed(1);
    }

    function fmtPi(v) {
      if (Math.abs(v - Math.PI) < 0.01) return 'π';
      if (Math.abs(v - 2 * Math.PI) < 0.01) return '2π';
      const r = v / Math.PI;
      if (Math.abs(r - Math.round(r)) < 0.01) return `${Math.round(r)}π`;
      return v.toFixed(2);
    }

    function update() {
      const As = fmtNum(A);
      const Bs = fmtNum(B);
      const period = fn === 'tan' ? Math.PI / B : 2 * Math.PI / B;
      const periodStr = fmtPi(period);

      const exprs = [
        {
          id: 'func',
          latex: `y = ${As}\\${fn}\\left(${Bs}x\\right)`,
          color: '#1a73e8',
          lineWidth: 2.5,
        },
      ];

      if (fn !== 'tan') {
        exprs.push(
          { id: 'ampP', latex: `y = ${As}`,  color: '#e74c3c', lineWidth: 1, lineStyle: Desmos.Styles.DASHED },
          { id: 'ampN', latex: `y = -${As}`, color: '#e74c3c', lineWidth: 1, lineStyle: Desmos.Styles.DASHED }
        );
      }

      calc.setExpressions(exprs);

      const titleEl = document.getElementById('title');
      titleEl.textContent = `三角関数 y = A ${fn}(Bx)`;

      document.getElementById('formula-display').textContent =
        `y = ${As} ${fn}(${Bs}x)`;

      if (fn === 'tan') {
        document.getElementById('info-display').textContent =
          `周期 ${periodStr}　／　漸近線: x = π/(2B) + nπ/B`;
      } else {
        document.getElementById('info-display').textContent =
          `振幅 ${As}（赤破線）　／　周期 ${periodStr}`;
      }
    }

    document.getElementById('slider-A').addEventListener('input', e => {
      A = parseFloat(e.target.value);
      document.getElementById('val-A').textContent = fmtNum(A);
      update();
    });
    document.getElementById('slider-B').addEventListener('input', e => {
      B = parseFloat(e.target.value);
      document.getElementById('val-B').textContent = fmtNum(B);
      update();
    });
    document.querySelectorAll('input[name=func]').forEach(r => {
      r.addEventListener('change', e => {
        fn = e.target.value;
        update();
      });
    });

    update();
  </script>
</body>
</html>
