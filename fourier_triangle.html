<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>フーリエ級数 — 三角波</title>
  <script src="https://www.desmos.com/api/v1.9/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; }
    h1 { text-align: center; padding: 16px; font-size: 1.2rem; color: #333; }
    #calculator { width: 100%; height: 65vh; }
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 14px;
      background: white;
      border-top: 1px solid #ddd;
    }
    .slider-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    label { font-size: 0.9rem; font-weight: bold; color: #555; }
    input[type=range] { width: 280px; }
    .value { font-size: 1.1rem; color: #1a73e8; min-width: 40px; text-align: center; }
    .formula { font-size: 0.85rem; color: #555; text-align: center; margin-top: 4px; }
    .legend {
      display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
      font-size: 0.85rem; margin-top: 4px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .dot { width: 18px; height: 4px; border-radius: 2px; }
  </style>
</head>
<body>
  <h1>フーリエ級数 — 三角波</h1>
  <div id="calculator"></div>
  <div class="controls">
    <div class="slider-group">
      <label>項数 N = <span class="value" id="val-n">1</span></label>
      <input type="range" id="slider-n" min="1" max="20" step="1" value="1">
    </div>
    <div class="formula" id="formula-display"></div>
    <div class="legend">
      <div class="legend-item">
        <div class="dot" style="background:#aaa"></div>
        <span>三角波（原波形）</span>
      </div>
      <div class="legend-item">
        <div class="dot" style="background:#1a73e8"></div>
        <span>フーリエ級数（N 項）</span>
      </div>
    </div>
  </div>

  <script>
    const elt = document.getElementById('calculator');
    const calc = Desmos.GraphingCalculator(elt, {
      keypad: false,
      expressions: false,
      settingsMenu: false,
      zoomButtons: true,
    });

    // 三角波: f(x) = (2/π) arcsin(sin(x))
    // フーリエ級数: f(x) = (8/π²) Σ_{k=0}^{N-1} (-1)^k/(2k+1)² * sin((2k+1)x)

    function buildLatex(N) {
      let terms = [];
      for (let k = 0; k < N; k++) {
        const n = 2 * k + 1;
        const sign = k % 2 === 0 ? '' : '-';
        terms.push(`${sign}\\frac{\\sin\\left(${n}x\\right)}{${n * n}}`);
      }
      return `y = \\frac{8}{\\pi^{2}}\\left(${terms.join('+')}\\right)`.replace(/\+\-/g, '-');
    }

    function buildText(N) {
      let terms = [];
      for (let k = 0; k < N; k++) {
        const n = 2 * k + 1;
        const sign = k % 2 === 0 ? '+' : '−';
        terms.push(`${sign}sin(${n}x)/${n}²`);
      }
      const str = terms.join(' ').replace(/^\+/, '');
      return `(8/π²)(${str})`;
    }

    function update(N) {
      calc.setExpressions([
        { id: 'original', latex: 'y = \\frac{2}{\\pi}\\arcsin\\left(\\sin\\left(x\\right)\\right)',
          color: '#aaaaaa', lineWidth: 1.5, lineStyle: Desmos.Styles.DASHED },
        { id: 'fourier', latex: buildLatex(N), color: '#1a73e8', lineWidth: 2.5 },
      ]);
      document.getElementById('formula-display').textContent = `f(x) ≈ ${buildText(N)}`;
    }

    document.getElementById('slider-n').addEventListener('input', e => {
      const N = parseInt(e.target.value);
      document.getElementById('val-n').textContent = N;
      update(N);
    });

    update(1);
  </script>
</body>
</html>
