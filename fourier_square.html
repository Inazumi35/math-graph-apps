<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>フーリエ級数 — 矩形波</title>
  <script src="https://www.desmos.com/api/v1.9/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; }
    h1 { text-align: center; padding: 16px; font-size: 1.2rem; color: #333; }
    #calculator { width: 100%; height: 62vh; }
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 14px;
      background: white;
      border-top: 1px solid #ddd;
    }
    .slider-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    label { font-size: 0.9rem; font-weight: bold; color: #555; }
    input[type=range] { width: 280px; }
    .value { font-size: 1.1rem; color: #1a73e8; min-width: 40px; text-align: center; }
    .formula { font-size: 0.85rem; color: #555; text-align: center; margin-top: 4px; }
    .legend {
      display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
      font-size: 0.85rem; margin-top: 4px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>
  <h1>フーリエ級数 — 矩形波</h1>
  <div id="calculator"></div>
  <div class="controls">
    <div class="slider-group">
      <label>項数 N = <span class="value" id="val-N">1</span></label>
      <input type="range" id="slider-N" min="1" max="20" step="1" value="1">
    </div>
    <div class="formula" id="formula-display"></div>
    <div class="legend">
      <div class="legend-item"><div class="dot" style="background:#1a73e8"></div>部分和 S_N(x)</div>
      <div class="legend-item"><div class="dot" style="background:#e74c3c; opacity:0.5"></div>矩形波（目標）</div>
    </div>
  </div>

  <script>
    const elt = document.getElementById('calculator');
    const calc = Desmos.GraphingCalculator(elt, {
      keypad: false,
      expressions: false,
      settingsMenu: false,
      zoomButtons: true,
    });

    let N = 1;

    // 矩形波を区間ごとの折れ線で近似表示（Desmos の piecewise）
    // f(x) = 1 (0 < x mod 2π < π), -1 (π < x mod 2π < 2π)
    // Desmos では直接 mod を使う
    const squareLatex =
      'y = \\operatorname{sign}\\left(\\sin\\left(x\\right)\\right)';

    function buildPartialSum(n) {
      // S_N(x) = (4/π) Σ_{k=1}^{N} sin((2k-1)x) / (2k-1)
      let terms = [];
      for (let k = 1; k <= n; k++) {
        const m = 2 * k - 1;
        terms.push(`\\frac{\\sin\\left(${m}x\\right)}{${m}}`);
      }
      return `y = \\frac{4}{\\pi}\\left(${terms.join('+')}\\right)`;
    }

    function fmtFormula(n) {
      if (n === 1) return 'S₁(x) = (4/π) sin x';
      const last = 2 * n - 1;
      return `S${n}(x) = (4/π)(sin x + sin 3x/3 + … + sin ${last}x/${last})`;
    }

    function update() {
      calc.setExpressions([
        {
          id: 'square',
          latex: squareLatex,
          color: '#e74c3c',
          lineWidth: 1.5,
          lineOpacity: 0.4,
        },
        {
          id: 'partial',
          latex: buildPartialSum(N),
          color: '#1a73e8',
          lineWidth: 2.5,
        },
      ]);
      document.getElementById('formula-display').textContent = fmtFormula(N);
    }

    document.getElementById('slider-N').addEventListener('input', e => {
      N = parseInt(e.target.value);
      document.getElementById('val-N').textContent = N;
      update();
    });

    update();
  </script>
</body>
</html>
