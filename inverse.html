<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>逆関数グラフ</title>
  <script src="https://www.desmos.com/api/v1.9/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; }
    h1 { text-align: center; padding: 14px; font-size: 1.2rem; color: #333; }
    #calculator { width: 100%; height: 55vh; }
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: white;
      border-top: 1px solid #ddd;
    }
    select {
      font-size: 1rem;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    .sliders {
      display: grid;
      grid-template-columns: 110px 1fr 44px;
      gap: 6px 10px;
      align-items: center;
      width: 100%;
      max-width: 480px;
    }
    .sliders label { font-size: 0.88rem; white-space: nowrap; }
    .sliders input[type=range] { width: 100%; }
    .sliders .val { font-size: 0.85rem; text-align: right; font-variant-numeric: tabular-nums; }
    .info {
      display: flex;
      gap: 32px;
      font-size: 0.88rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .info-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .info-item strong { font-size: 0.78rem; color: #666; }
    .legend {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 0.88rem;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .dot { width: 18px; height: 4px; border-radius: 2px; }
    .dashed { background: repeating-linear-gradient(90deg, #aaa 0 6px, transparent 6px 10px); height: 2px; }
  </style>
</head>
<body>
  <h1>逆関数と y = x の対称性</h1>
  <div id="calculator"></div>
  <div class="controls">
    <select id="func-select">
      <option value="quad">y = ax²（x ≥ 0）と逆関数</option>
      <option value="cube">y = ax³ と逆関数</option>
      <option value="exp">y = aeˣ と逆関数</option>
    </select>

    <div class="sliders" id="sliders"></div>

    <div class="info">
      <div class="info-item">
        <strong>元の関数の定義域</strong>
        <span id="info-domain">—</span>
      </div>
      <div class="info-item">
        <strong>元の関数の値域</strong>
        <span id="info-range">—</span>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="dot" style="background:#1a73e8"></div>
        <span id="label-f"></span>
      </div>
      <div class="legend-item">
        <div class="dot" style="background:#e67e22"></div>
        <span id="label-inv"></span>
      </div>
      <div class="legend-item">
        <div class="dot dashed"></div>
        <span>y = x</span>
      </div>
    </div>
  </div>

  <script>
    const elt = document.getElementById('calculator');
    const calc = Desmos.GraphingCalculator(elt, {
      keypad: false, expressions: false, settingsMenu: false, zoomButtons: true,
    });

    let state = { func: 'quad', a: 1, xMin: 0, xMax: 3 };

    function r(v, d = 2) { return Math.round(v * 10 ** d) / 10 ** d; }
    function fmt(v) { const n = r(v, 2); return n === Math.round(n) ? String(Math.round(n)) : n.toFixed(2); }

    function addSlider(label, id, min, max, step, val, onInput) {
      const container = document.getElementById('sliders');
      const lbl = document.createElement('label');
      lbl.textContent = label;
      const input = document.createElement('input');
      input.type = 'range'; input.id = id;
      input.min = min; input.max = max; input.step = step; input.value = val;
      const span = document.createElement('span');
      span.className = 'val';
      span.textContent = val;
      input.addEventListener('input', () => { span.textContent = input.value; onInput(parseFloat(input.value)); });
      container.append(lbl, input, span);
    }

    function buildSliders(func) {
      document.getElementById('sliders').innerHTML = '';
      addSlider('a（係数）', 'a', 0.1, 3, 0.1, state.a, v => { state.a = v; update(); });
      if (func !== 'quad') {
        addSlider('x 最小', 'xMin', -5, -0.5, 0.5, state.xMin, v => {
          if (v >= state.xMax) return;
          state.xMin = v; update();
        });
      }
      addSlider('x 最大', 'xMax', 0.5, 5, 0.5, state.xMax, v => {
        if (v <= state.xMin) return;
        state.xMax = v; update();
      });
    }

    function update() {
      const { func, a, xMin, xMax } = state;
      let fLatex, invLatex, fLabel, invLabel, domain, rangeStr;

      if (func === 'quad') {
        const yMax = r(a * xMax * xMax);
        fLatex   = `y=${a}x^{2}\\left\\{0\\le x\\le ${xMax}\\right\\}`;
        invLatex = `y=\\sqrt{\\frac{x}{${a}}}\\left\\{0\\le x\\le ${yMax}\\right\\}`;
        fLabel   = `y = ${a}x²`;
        invLabel = `y = √(x / ${a})`;
        domain   = `0 ≤ x ≤ ${xMax}`;
        rangeStr = `0 ≤ y ≤ ${fmt(yMax)}`;
      } else if (func === 'cube') {
        const yL = r(a * xMin ** 3), yR = r(a * xMax ** 3);
        const [yLo, yHi] = yL < yR ? [yL, yR] : [yR, yL];
        fLatex   = `y=${a}x^{3}\\left\\{${xMin}\\le x\\le ${xMax}\\right\\}`;
        invLatex = `y=\\left(\\frac{x}{${a}}\\right)^{1/3}\\left\\{${yLo}\\le x\\le ${yHi}\\right\\}`;
        fLabel   = `y = ${a}x³`;
        invLabel = `y = ∛(x / ${a})`;
        domain   = `${xMin} ≤ x ≤ ${xMax}`;
        rangeStr = `${fmt(yLo)} ≤ y ≤ ${fmt(yHi)}`;
      } else {
        const yLo = r(a * Math.exp(xMin), 3), yHi = r(a * Math.exp(xMax), 3);
        fLatex   = `y=${a}e^{x}\\left\\{${xMin}\\le x\\le ${xMax}\\right\\}`;
        invLatex = `y=\\ln\\left(\\frac{x}{${a}}\\right)\\left\\{${yLo}\\le x\\le ${yHi}\\right\\}`;
        fLabel   = `y = ${a}eˣ`;
        invLabel = `y = ln(x / ${a})`;
        domain   = `${xMin} ≤ x ≤ ${xMax}`;
        rangeStr = `${fmt(yLo)} ≤ y ≤ ${fmt(yHi)}`;
      }

      calc.setExpressions([
        { id: 'sym', latex: 'y=x',    color: '#aaaaaa', lineStyle: Desmos.Styles.DASHED, lineWidth: 1.5 },
        { id: 'f',   latex: fLatex,   color: '#1a73e8', lineWidth: 2.5 },
        { id: 'inv', latex: invLatex, color: '#e67e22', lineWidth: 2.5 },
      ]);

      document.getElementById('label-f').textContent    = fLabel;
      document.getElementById('label-inv').textContent  = invLabel;
      document.getElementById('info-domain').textContent = domain;
      document.getElementById('info-range').textContent  = rangeStr;
    }

    document.getElementById('func-select').addEventListener('change', e => {
      state.func = e.target.value;
      state.a = 1;
      state.xMin = state.func === 'quad' ? 0 : -2;
      state.xMax = 3;
      buildSliders(state.func);
      update();
    });

    buildSliders('quad');
    update();
  </script>
</body>
</html>
