<script>
const L  = '\\mathcal{L}';
const Li = '\\mathcal{L}^{-1}';

const UNITS = [
  {

      { q:`$${L}[t^2]$ を求めよ．`, choices:[`$\\dfrac{1}{s^2}$`,`$\\dfrac{2}{s^2}$`,`$\\dfrac{2}{s^3}$`,`$\\dfrac{1}{s^3}$`], answer:2, exp:`$${L}[t^n]=\\dfrac{n!}{s^{n+1}}$，$n=2$ より $\\dfrac{2}{s^3}$` },
      { q:`$${L}[1]$ を求めよ．`, choices:[`$1$`,`$\\dfrac{1}{s}$`,`$\\dfrac{1}{s^2}$`,`$s$`], answer:1, exp:`$${L}[1]=\\dfrac{1}{s}$（$s>0$）` },
      { q:`$${L}[e^{-2t}]$ を求めよ．`, choices:[`$\\dfrac{1}{s-2}$`,`$\\dfrac{1}{s+2}$`,`$\\dfrac{2}{s^2+4}$`,`$\\dfrac{s}{s^2+4}$`], answer:1, exp:`$a=-2$ より $${L}[e^{-2t}]=\\dfrac{1}{s+2}$` },
      { q:`$${L}[t]$ を求めよ．`, choices:[`$\\dfrac{1}{s}$`,`$\\dfrac{2}{s^2}$`,`$\\dfrac{1}{s^2}$`,`$\\dfrac{1}{s^3}$`], answer:2, exp:`$${L}[t^n]=\\dfrac{n!}{s^{n+1}}$，$n=1$ より $\\dfrac{1}{s^2}$` },
      { q:`$${L}[3\\sin t]$ を求めよ．`, choices:[`$\\dfrac{1}{s^2+1}$`,`$\\dfrac{3}{s^2+1}$`,`$\\dfrac{3s}{s^2+1}$`,`$\\dfrac{3}{s^2+3}$`], answer:1, exp:`線形性より $3\\cdot\\dfrac{1}{s^2+1}=\\dfrac{3}{s^2+1}$` },
    ]
  },
  {
    name: 's移動法則（第1移動定理）', icon: '🔀',
    questions: [
      { q:`$${L}[e^{2t}\\sin 3t]$ を求めよ．`, choices:[`$\\dfrac{3}{(s-2)^2+9}$`,`$\\dfrac{3}{(s+2)^2+9}$`,`$\\dfrac{s-2}{(s-2)^2+9}$`,`$\\dfrac{3}{s^2+9}$`], answer:0, exp:`$${L}[e^{at}f(t)]=F(s-a)$．$s\\to s-2$ で $\\dfrac{3}{(s-2)^2+9}$` },
      { q:`$${L}[e^{-t}\\cos 2t]$ を求めよ．`, choices:[`$\\dfrac{s+1}{(s+1)^2+4}$`,`$\\dfrac{s-1}{(s-1)^2+4}$`,`$\\dfrac{2}{(s+1)^2+4}$`,`$\\dfrac{s}{(s+1)^2+4}$`], answer:0, exp:`$s\\to s+1$ で $\\dfrac{s+1}{(s+1)^2+4}$` },
      { q:`$${L}[te^{-t}]$ を求めよ．`, choices:[`$\\dfrac{1}{(s+1)^2}$`,`$\\dfrac{1}{(s-1)^2}$`,`$\\dfrac{1}{s^2+1}$`,`$\\dfrac{1}{s+1}$`], answer:0, exp:`$${L}[t]=\\dfrac{1}{s^2}$，$s\\to s+1$ で $\\dfrac{1}{(s+1)^2}$` },
      { q:`$${L}[e^{3t}\\cos t]$ を求めよ．`, choices:[`$\\dfrac{s}{(s-3)^2+1}$`,`$\\dfrac{s-3}{(s-3)^2+1}$`,`$\\dfrac{1}{(s-3)^2+1}$`,`$\\dfrac{s+3}{(s+3)^2+1}$`], answer:1, exp:`$s\\to s-3$ で $\\dfrac{s-3}{(s-3)^2+1}$` },

  },
  {
    name: '逆ラプラス変換（基本）', icon: '🔁',

      { q:`$${Li}\\!\\left[\\dfrac{3}{s^2+9}\\right]$ を求めよ．`, choices:[`$\\cos 3t$`,`$3\\cos 3t$`,`$\\sin 3t$`,`$3\\sin 3t$`], answer:2, exp:`$${L}[\\sin at]=\\dfrac{a}{s^2+a^2}$，$a=3$ より $\\sin 3t$` },
      { q:`$${Li}\\!\\left[\\dfrac{2}{s^3}\\right]$ を求めよ．`, choices:[`$t$`,`$2t$`,`$t^2$`,`$2t^2$`], answer:2, exp:`$${L}[t^2]=\\dfrac{2}{s^3}$ より $t^2$` },
      { q:`$${Li}\\!\\left[\\dfrac{1}{s^2}\\right]$ を求めよ．`, choices:[`$1$`,`$t$`,`$t^2$`,`$2t$`], answer:1, exp:`$${L}[t]=\\dfrac{1}{s^2}$ より $t$` },
      { q:`$${Li}\\!\\left[\\dfrac{1}{(s+1)^2}\\right]$ を求めよ．`, choices:[`$te^{t}$`,`$te^{-t}$`,`$e^{-t}$`,`$t^2 e^{-t}$`], answer:1, exp:`$${L}[te^{-t}]=\\dfrac{1}{(s+1)^2}$ より $te^{-t}$` },
    ]
  },
  {
    name: '逆ラプラス変換（部分分数）', icon: '🧩',
    questions: [
      { q:`$${Li}\\!\\left[\\dfrac{1}{s(s+1)}\\right]$ を求めよ．`, choices:[`$1-e^{-t}$`,`$e^{-t}-1$`,`$1+e^{-t}$`,`$e^{t}-1$`], answer:0, exp:`$\\dfrac{1}{s(s+1)}=\\dfrac{1}{s}-\\dfrac{1}{s+1}$ より $1-e^{-t}$` },
      { q:`$${Li}\\!\\left[\\dfrac{1}{(s+1)(s+2)}\\right]$ を求めよ．`, choices:[`$e^{-t}-e^{-2t}$`,`$e^{-2t}-e^{-t}$`,`$e^{t}-e^{2t}$`,`$e^{-t}+e^{-2t}$`], answer:0, exp:`$\\dfrac{1}{(s+1)(s+2)}=\\dfrac{1}{s+1}-\\dfrac{1}{s+2}$ より $e^{-t}-e^{-2t}$` },
      { q:`$${Li}\\!\\left[\\dfrac{2}{s(s+2)}\\right]$ を求めよ．`, choices:[`$1-e^{-2t}$`,`$e^{-2t}-1$`,`$1+e^{-2t}$`,`$e^{2t}-1$`], answer:0, exp:`$\\dfrac{2}{s(s+2)}=\\dfrac{1}{s}-\\dfrac{1}{s+2}$ より $1-e^{-2t}$` },
      { q:`$${Li}\\!\\left[\\dfrac{3}{(s+1)(s-2)}\\right]$ を求めよ．`, choices:[`$e^{-t}-e^{2t}$`,`$e^{2t}-e^{-t}$`,`$e^{-t}+e^{2t}$`,`$3e^{-t}-3e^{2t}$`], answer:1, exp:`$\\dfrac{3}{(s+1)(s-2)}=-\\dfrac{1}{s+1}+\\dfrac{1}{s-2}$ より $e^{2t}-e^{-t}$` },
      { q:`$${Li}\\!\\left[\\dfrac{2}{(s+1)^2}\\right]$ を求めよ．`, choices:[`$te^{t}$`,`$2te^{-t}$`,`$2e^{-t}$`,`$t^2 e^{-t}$`], answer:1, exp:`$${L}[te^{-t}]=\\dfrac{1}{(s+1)^2}$ より $2te^{-t}$` },
      { q:`$${Li}\\!\\left[\\dfrac{1}{s^2+2s+1}\\right]$ を求めよ．`, choices:[`$te^{t}$`,`$te^{-t}$`,`$e^{-t}$`,`$\\sin t$`], answer:1, exp:`$s^2+2s+1=(s+1)^2$，$${L}[te^{-t}]=\\dfrac{1}{(s+1)^2}$ より $te^{-t}$` },
      { q:`$\\dfrac{1}{(s+1)^2(s-2)}$ の部分分数展開の正しい形はどれか．`, choices:[`$\\dfrac{A}{(s+1)^2}+\\dfrac{B}{s-2}$`,`$\\dfrac{A}{s+1}+\\dfrac{B}{(s+1)^2}+\\dfrac{C}{s-2}$`,`$\\dfrac{A}{s+1}+\\dfrac{B}{s-2}$`,`$\\dfrac{A}{(s+1)^2(s-2)}$`], answer:1, exp:`重根 $(s+1)^2$ には $\\dfrac{A}{s+1}$ と $\\dfrac{B}{(s+1)^2}$ の両方が必要` },
      { q:`$${Li}\\!\\left[\\dfrac{s}{(s+1)(s+2)}\\right]$ を求めよ．`, choices:[`$e^{-t}+2e^{-2t}$`,`$-e^{-t}+2e^{-2t}$`,`$e^{-t}-2e^{-2t}$`,`$2e^{-t}-e^{-2t}$`], answer:1, exp:`部分分数：$\\dfrac{-1}{s+1}+\\dfrac{2}{s+2}$ より $-e^{-t}+2e^{-2t}$` },
    ]
  },
  {
    name: '微分の変換', icon: '📐',
    questions: [
      { q:`$f(0)=0$ のとき，$${L}[f'(t)]$ を $F(s)$ で表せ．`, choices:[`$sF(s)$`,`$s^2F(s)$`,`$F(s)/s$`,`$F(s)-f(0)$`], answer:0, exp:`$${L}[f'(t)]=sF(s)-f(0)$，$f(0)=0$ より $sF(s)$` },
      { q:`一般の場合，$${L}[f'(t)]$ を $F(s)$ で表せ．`, choices:[`$sF(s)-f(0)$`,`$s^2F(s)-sf(0)$`,`$F(s)+f(0)$`,`$sF(s)+f(0)$`], answer:0, exp:`微分の変換公式：$${L}[f'(t)]=sF(s)-f(0)$` },
      { q:`$f(0)=f'(0)=0$ のとき，$${L}[f''(t)]$ を $F(s)$ で表せ．`, choices:[`$sF(s)$`,`$s^2F(s)$`,`$s^3F(s)$`,`$F(s)/s^2$`], answer:1, exp:`$${L}[f''(t)]=s^2F(s)-sf(0)-f'(0)$，初期値0より $s^2F(s)$` },
      { q:`一般の場合，$${L}[f''(t)]$ を $F(s)$ で表せ．`, choices:[`$s^2F(s)-sf(0)-f'(0)$`,`$s^2F(s)-f(0)-f'(0)$`,`$s^2F(s)-sf(0)+f'(0)$`,`$s^2F(s)+sf(0)+f'(0)$`], answer:0, exp:`$${L}[f''(t)]=s^2F(s)-sf(0)-f'(0)$` },
      { q:`像関数の微分：$${L}[tf(t)]$ を $F(s)$ で表せ．`, choices:[`$F'(s)$`,`$-F'(s)$`,`$F(s)/s$`,`$sF(s)$`], answer:1, exp:`$${L}[tf(t)]=-\\dfrac{d}{ds}F(s)=-F'(s)$` },
      { q:`$${L}[t\\sin t]$ を求めよ（像関数の微分を用いて）．`, choices:[`$\\dfrac{1}{(s^2+1)^2}$`,`$\\dfrac{2s}{(s^2+1)^2}$`,`$\\dfrac{s}{s^2+1}$`,`$\\dfrac{-2s}{(s^2+1)^2}$`], answer:1, exp:`$-\\dfrac{d}{ds}\\dfrac{1}{s^2+1}=\\dfrac{2s}{(s^2+1)^2}$` },
      { q:`$${L}[t\\cos t]$ を求めよ（像関数の微分を用いて）．`, choices:[`$\\dfrac{s^2-1}{(s^2+1)^2}$`,`$\\dfrac{1-s^2}{(s^2+1)^2}$`,`$\\dfrac{2s}{(s^2+1)^2}$`,`$\\dfrac{s}{s^2+1}$`], answer:0, exp:`$-\\dfrac{d}{ds}\\dfrac{s}{s^2+1}=\\dfrac{s^2-1}{(s^2+1)^2}$` },

  {

      { q:`$X(s)=\\dfrac{1}{s^2+1}$ のとき $x(t)$ は？`, choices:[`$\\cos t$`,`$\\sin t$`,`$e^{t}$`,`$\\cosh t$`], answer:1, exp:`$${Li}\\!\\left[\\dfrac{1}{s^2+1}\\right]=\\sin t$` },
      { q:`$x'+2x=e^{-t}$，$x(0)=0$ のとき $X(s)$ は？`, choices:[`$\\dfrac{1}{(s+1)(s+2)}$`,`$\\dfrac{1}{(s-1)(s-2)}$`,`$\\dfrac{1}{(s+1)(s-2)}$`,`$\\dfrac{s}{(s+1)(s+2)}$`], answer:0, exp:`$(s+2)X(s)=\\dfrac{1}{s+1}$ より $X(s)=\\dfrac{1}{(s+1)(s+2)}$` },
      { q:`$${Li}\\!\\left[\\dfrac{1}{(s+1)(s+2)}\\right]$ を求めよ．`, choices:[`$e^{-t}+e^{-2t}$`,`$e^{-t}-e^{-2t}$`,`$e^{t}-e^{2t}$`,`$e^{2t}-e^{t}$`], answer:1, exp:`$\\dfrac{1}{s+1}-\\dfrac{1}{s+2}$ より $e^{-t}-e^{-2t}$` },
    ]
  }
];

function pickRandom(arr, n) {
  return [...arr].sort(() => Math.random() - 0.5).slice(0, n);
}

let currentUnit=-1, currentQ=0, sessionScore=0, sessionWrong=[], answered=false;
let isReview=false, reviewQueue=[], reviewIdx=0, activeQuestions=[];

function renderHome() {
  const list = document.getElementById('unit-list');
  list.innerHTML = '';
  UNITS.forEach((unit, i) => {
    const card = document.createElement('div');
    card.className = 'unit-card';
    card.innerHTML = `<div class="unit-icon">${unit.icon}</div><div class="unit-name">${unit.name}</div><div>▶</div>`;
    card.onclick = () => startUnit(i);
    list.appendChild(card);
  });
}

function startUnit(i) {
  currentUnit=i; currentQ=0; sessionScore=0; sessionWrong=[];
  isReview=false;
  activeQuestions = pickRandom(UNITS[i].questions, 5);
  document.getElementById('quiz-unit-name').textContent = UNITS[i].name;
  document.getElementById('review-header').style.display = 'none';
  showScreen('quiz-screen');
  showQuestion();
}

function showQuestion() {
  const questions = isReview ? reviewQueue : activeQuestions;
  const idx = isReview ? reviewIdx : currentQ;
  const q = questions[idx];
  const total = questions.length;

  answered = false;
  document.getElementById('progress-bar').style.width = (idx/total*100)+'%';
  document.getElementById('quiz-qcount').textContent = `${idx+1} / ${total}`;
  document.getElementById('question-text').innerHTML = q.q;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = '';
  document.getElementById('next-btn').disabled = true;
  document.getElementById('next-btn').textContent = (idx+1<total) ? '次の問題へ' : '結果を見る';

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c,ci) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `${'①②③④'[ci]} ${c}`;
    btn.onclick = () => selectAnswer(ci, q);
    choicesEl.appendChild(btn);
  });
  MathJax.typesetPromise([document.getElementById('card'), choicesEl]);
}

function selectAnswer(idx, q) {
  if (answered) return;
  answered = true;
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled=true);
  const fb = document.getElementById('feedback');
  if (idx === q.answer) {
    btns[idx].classList.add('correct');
    fb.textContent = '✓ 正解！';
    fb.className = 'ok';
    if (!isReview) sessionScore++;
  } else {
    btns[idx].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    fb.className = 'ng';
    fb.innerHTML = `✗ 不正解　【解説】 ${q.exp}`;
    if (!isReview) sessionWrong.push(q);
    MathJax.typesetPromise([fb]);
  }
  document.getElementById('next-btn').disabled = false;
}

document.getElementById('next-btn').onclick = () => {
  if (isReview) {
    reviewIdx++;
    if (reviewIdx < reviewQueue.length) showQuestion();
    else { alert('復習完了！'); goHome(); }
  } else {
    currentQ++;
    if (currentQ < 5) showQuestion();
    else finishUnit();
  }
};

function finishUnit() {
  showScreen('result-screen');
  document.getElementById('unit-result-title').textContent = UNITS[currentUnit].name + ' 結果';
  document.getElementById('unit-score-display').textContent = `${sessionScore} / 5`;
  const pct = sessionScore/5*100;
  document.getElementById('unit-result-msg').textContent =
    pct===100 ? '🎉 満点！完璧です！' : pct>=60 ? '👍 間違えた問題を復習しよう。' : '📖 教科書を確認してから再挑戦しよう。';

  const ws = document.getElementById('wrong-summary');
  ws.innerHTML = '';
  if (sessionWrong.length > 0) {
    ws.innerHTML = '<h3>▼ 間違えた問題</h3>';
    sessionWrong.forEach(w => {
      const div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML = `${w.q}<br>【解説】 ${w.exp}`;
      ws.appendChild(div);
    });
    MathJax.typesetPromise([ws]);
    document.getElementById('retry-btn').style.display = 'block';
  } else {
    ws.innerHTML = '<div style="text-align:center;color:#2e7d32;font-weight:bold;padding:8px;">全問正解！</div>';
    document.getElementById('retry-btn').style.display = 'none';
  }
}

function retryWrong() {
  reviewQueue=[...sessionWrong]; reviewIdx=0; isReview=true;
  document.getElementById('quiz-unit-name').textContent='復習';
  document.getElementById('review-header').style.display='block';
  showScreen('quiz-screen');
  showQuestion();
}

function goHome() { showScreen('home-screen'); }
function confirmBack() { if (confirm('途中で終了しますか？')) goHome(); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

renderHome();
</script>
