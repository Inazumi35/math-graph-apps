<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>べき関数グラフ</title>
  <script src="https://www.desmos.com/api/v1.9/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; }
    h1 { text-align: center; padding: 16px; font-size: 1.2rem; color: #333; }
    #calculator { width: 100%; height: 70vh; }
    .controls {
      display: flex;
      justify-content: center;
      padding: 16px;
      background: white;
      border-top: 1px solid #ddd;
    }
    .slider-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    label { font-size: 0.9rem; font-weight: bold; color: #555; }
    input[type=range] { width: 220px; }
    .value { font-size: 1.1rem; color: #1a73e8; min-width: 40px; text-align: center; }
    .formula { text-align: center; font-size: 1.1rem; padding: 8px; color: #333; }
    .note { text-align: center; font-size: 0.85rem; color: #888; padding-bottom: 8px; }
  </style>
</head>
<body>
  <h1>べき関数 y = xⁿ</h1>
  <div id="calculator"></div>
  <div class="formula" id="formula-display"></div>
  <div class="note">n が偶数 → y 軸対称　／　n が奇数 → 原点対称</div>
  <div class="controls">
    <div class="slider-group">
      <label>n = <span class="value" id="val-n">2</span></label>
      <input type="range" id="slider-n" min="-4" max="5" step="1" value="2">
    </div>
  </div>

  <script>
    const elt = document.getElementById('calculator');
    const calc = Desmos.GraphingCalculator(elt, {
      keypad: false,
      expressions: false,
      settingsMenu: false,
      zoomButtons: true,
    });

    let n = 2;

    function update() {
      calc.setExpressions([
        { id: 'func', latex: `y = x^{${n}}`, color: '#1a73e8' },
      ]);
      document.getElementById('formula-display').textContent = `y = x^${n}`;
    }

    document.getElementById('slider-n').addEventListener('input', e => {
      n = parseInt(e.target.value);
      document.getElementById('val-n').textContent = n;
      update();
    });

    update();
  </script>
</body>
</html>
