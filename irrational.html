<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>無理関数グラフ</title>
  <script src="https://www.desmos.com/api/v1.9/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; }
    h1 { text-align: center; padding: 16px; font-size: 1.2rem; color: #333; }
    #calculator { width: 100%; height: 75vh; }
    .legend {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 12px;
      background: white;
      border-top: 1px solid #ddd;
      flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; }
    .dot { width: 16px; height: 4px; border-radius: 2px; }
  </style>
</head>
<body>
  <h1>無理関数</h1>
  <div id="calculator"></div>
  <div class="legend">
    <div class="legend-item">
      <div class="dot" style="background:#1a73e8"></div>
      <span>y = √x &nbsp;(x<sup>1/2</sup>)</span>
    </div>
    <div class="legend-item">
      <div class="dot" style="background:#e67e22"></div>
      <span>y = ∛x &nbsp;(x<sup>1/3</sup>)</span>
    </div>
    <div class="legend-item">
      <div class="dot" style="background:#27ae60"></div>
      <span>y = ∜x &nbsp;(x<sup>1/4</sup>)</span>
    </div>
  </div>

  <script>
    const elt = document.getElementById('calculator');
    const calc = Desmos.GraphingCalculator(elt, {
      keypad: false,
      expressions: false,
      settingsMenu: false,
      zoomButtons: true,
    });

    calc.setExpressions([
      { id: 'sqrt',  latex: 'y = \\sqrt{x}',     color: '#1a73e8', lineWidth: 2.5 },
      { id: 'cbrt',  latex: 'y = x^{1/3}',        color: '#e67e22', lineWidth: 2.5 },
      { id: 'qrt',   latex: 'y = x^{1/4}',        color: '#27ae60', lineWidth: 2.5 },
    ]);
  </script>
</body>
</html>
